    <body>
        <noscript aria-hidden="true">
            <div id="noscript_help" aria-label="Javascriptを有効にして獅子児祭マップを表示します。">
                <a href="https://support.google.com/admanager/answer/12654?hl=ja" target="_blank">Javascriptを有効にして獅子児祭マップを表示します。</a>
            </div>
        </noscript>
        <div id="load_spare" class="protected">
            <div id="load_spare_c" aria-hidden="true">
                <div id="logo_spare_w">
                    <img id="spare_logo" src="/resources/img/logo-loader.png" aria-label="獅子児祭のロゴ">
                    <h4 id="spare_message">please wait...</h4>
                </div>
            </div>
        </div>

        <div id="app-mount" aria-hidden="true">
            <main aria-label="獅子児祭マップ">
                <div id="shishiji-popup-container">
                    <div id="shishiji-popup-container-c">
                        <!--popup window content-->
                    </div>
                </div>
                <shishiji-mx-overlay class="protected"></shishiji-mx-overlay>

                <div id="place-selector" class="protected fselector-btn">
                    <div id="psdummy"></div>
                    <div id="place-options-w">
                        <div id="place-options">
                            <div class="placeOpt fselector-btn" style="width: 67px; height: 67px;">

                            </div>
                            <div class="placeOpt realshadow" aria-label="">
                                <h3>F1</h3>
                            </div>
                            <div class="placeOpt realshadow" aria-label="">
                                <h3>F2</h3>
                            </div>
                            <div class="placeOpt realshadow" aria-label="">
                                <h3>F3</h3>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="user-stricter"></div>
                <div id="shishiji-view" aria-label="地図をドラッグして操作します。写真などをタップ·クリックして詳細を表示します。">
                    <canvas id="shishiji-canvas" style="width: 100vw; height: 100vh;"></canvas>
                </div>

                <div id="shishiji-overview" class="protected">
                    <div id="overview-options">
                        <div class="overview-option" id="overview-share">
                            <div class="ccENTER_Z ovv-btn realshadow overview-c" id="overview-share-c" aria-label="閉じる">
                                <span class="material-symbols-outlined" style="mix-blend-mode: differnce; cursor: pointer; color: black;" aria-label="共有">
                                    ios_share
                                </span>
                            </div>
                        </div>
                        <div id="overview-close-w">
                            <div class="overview-option" id="overview-close">
                                <div class="ccENTER_Z ovv-btn realshadow overview-c" id="overview-close-c" aria-label="閉じる">
                                    <span class="material-symbols-outlined" style="mix-blend-mode: differnce; cursor: pointer; color: black;" aria-label="閉じる">
                                        close
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="overview-context">

                    </div>
                </div>
            </main>
        </div>
