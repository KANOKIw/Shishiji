<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"></meta>
        <meta property="og:type" content="website">
        <meta property="og:title" content="Login - Shishiji fes">
        <meta property="og:description" content="">
        <meta property="og:site_name" content="KANOKIw">
        <meta property="og:image" content="https://pbs.twimg.com/profile_images/1402955393194594308/a5pHbQKZ_400x400.jpg">
        <meta property="og:locale" content="ja">
        <meta name="twitter:card" content="summary">
        <meta name="twitter:site" content="@shishijifes">
        <meta name="twitter:creator" content="@KUMANKENw">
        <meta name="twitter:title" content="Login - Shishiji fes">
        <meta name="twitter:description" content="">
        <meta name="twitter:image" content="https://pbs.twimg.com/profile_images/1402955393194594308/a5pHbQKZ_400x400.jpg">
        <meta name="theme-color" content="#ffffff">
        <title>Login - Shishiji fes</title>
        <link rel="icon" href="/resources/img/favicon.ico">
        <link rel="stylesheet" href="/src/assets/builds/gglMS.css">
        <link href="https://use.fontawesome.com/releases/v5.6.1/css/all.css" rel="stylesheet">
        <script src="/src/assets/util.js"></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
        <script src="/src/assets/manage/coop.js"></script>
        <style>
            *{
                margin: 0;
                font-family: "SF Pro JP", "SF Pro SC", "SF Pro TC", "SF Pro KR", "SF Pro Text", "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ Pro W3", "Noto Sans JP", メイリオ, Meiryo, "ＭＳ Ｐゴシック", PingFang, "Helvetica Neue", Helvetica, Arial, sans-serif;
            }

            .loginmat{
                position: fixed;
                inset: 0;
                margin: auto;
                width: fit-content;
                height: fit-content;
                text-align: center;
            }

            #login_enter{
                border-radius: 0;
                color: black;
                border: 1px solid black;
            }

            input{
                outline: none;
                border: none;
            }

            .wdADW{
                border-width: thin;
                border-style: solid;
                padding-right: 5px;
            }
        </style>
    </head>
    <body>
        <div class="loginmat">
            <h2>Login</h2>
            <p>実行委員から提供されたものを使用してください</p>
            <div style="height: 150px; display: flex; align-items: center; justify-content: center;">
                <form action="" method="get" class="form-login">
                    <p style="color: red; display: none;" id="required-not-filled"></p>
                    <div class="form-login">
                        <label for="name">username:&nbsp;</label>
                        <span class="wdADW">
                            <input type="text" name="username" id="login_username">
                        </span>
                    </div>
                    <div style="height: 5px;"></div>
                    <div class="form-login">
                        <label for="email">password:&nbsp;</label>
                        <span class="wdADW">
                            <input type="password" name="password" id="login_password">
                            <span id="buttonEye" class="fa fa-eye"></span>
                        </span>
                    </div>
                    <hr style="margin: 5px;">
                    <div class="form-login">
                        <input id="login_enter" type="button" name="submit" value="Enter">
                    </div>
                </form>
            </div>
        </div>
        <script src="/src/assets/manage/login.js"></script>
    </body>
</html>
