        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
        <style>
            *{
                margin: 0;
            }
            .loginmat{
                position: fixed;
                inset: 0;
                margin: auto;
                width: fit-content;
                height: fit-content;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="loginmat">
            <h2>Login</h2>
            <p>実行委員から提供されたものを使用してください</p>
            <div style="height: 150px; display: flex; align-items: center; justify-content: center;">
                <form action="" method="get" class="form-login">
                    <p style="color: red; display: none;" id="required-not-filled"></p>
                    <div class="form-login">
                        <label for="name">username:&nbsp;</label>
                        <input type="text" name="name" id="login_username">
                    </div>
                    <div class="form-login">
                        <label for="email">password:&nbsp;</label>
                        <input type="text" name="email" id="login_password">
                    </div>
                    <hr style="margin: 5px;">
                    <div class="form-login">
                        <input id="login_enter" type="button" value="Enter">
                    </div>
                </form>
            </div>
        </div>
        <script src="/src/assets/manage/login.js"></script>
    </body>
