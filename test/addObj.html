<!DOCTYPE html>
<html>
    <head>
        <style>
            *{
                margin: 0;
            }
        </style>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    </head>
    <body>
        <button id="sum" style="background-color: white;">SUBMIT</button>
        <p>オブジェクト名</p>
        <div contenteditable="true" style="width: 100vw; border: solid 2px black;" id="nm"></div>
        <div contenteditable="true" style="width: 100vw; height: 100vh; border: solid 2px black;" id="man"></div>
        <script>
            $("#man").html(`{   
    "article": {
        "title": "",
        "core_grade": "",
        "theme_color": "#00AA00",
        "content": "",
        "crowd_status": {
            "level": 0,
            "estimated": 0
        },
        "font_family": "",
        "custom_tr": [],
        "images": {
            "header": "URL"
        },
        "venue": "",
        "schedule": ""
    },
    "object": {
        "type": {
            "event": "volunteer",
            "behavior": "static",
            "border": null
        },
        "coordinate": {
            "x": 0,
            "y": 0
        },
        "images": {
            "icon": "URL"
        },
        "size": {
            "width": 100,
            "height": 100
        },
        "floor": ""
    }
}
`.replace(/\n/g, "<br>").replace(/ /g, "&nbsp;"));
var t = 0;
var e = 0;
var y = 0;
$("#sum").on("click", (e) => {
    var name = $("#nm").text();
    if (name.length < 1) {t($("#nm"));return;}
    $.post("/api/addobject/", {c: $("#man").html().replace(/&nbsp;/g, " ").replace(/<br>/g, "\n"), n: name}).done(d=>{
        $("#sum").css("background-color", "green");
        clearTimeout(e);
        e = setTimeout(() => {
            $("#sum").css("background-color", "#ffffff");
        }, 5000);
    }).fail(e=>{
        if (e.a == 1){
            $("#sum").text("that name already exists");
            clearTimeout(y);
            y = setTimeout(() => {
                $("#sum").text("SUBMIT");
            }, 5000);
            return;
        }
        t($("#man"));
    });
    function t(...j){
        j.forEach(e=>e.css("background-color", "rgba(122, 0, 0, 0.5)"));
        clearTimeout(t);
        t = setTimeout(() => {
            j.forEach(e=>e.css("background-color", "#ffffff"));
        }, 5000);
    }
});
        </script>
    </body>
</html>
